<!-- 인쇄 버튼 (화면에서만 보임) -->
<button class="print-btn" onclick="handlePrint()">📥 PDF 저장</button>

<!-- 동적으로 생성됨 -->
<div id="magazine"></div>

<script>
function handlePrint() {
  if (navigator.userAgent.match(/iPhone|iPad|iPod|Android/i)) {
    alert('모바일에서는 브라우저 메뉴 → 공유 → PDF로 저장을 이용해 주세요.');
  } else {
    window.print();
  }
}

// ─── 데이터 파일 경로 ───
// 실제 사용 시 이 경로만 변경하면 됩니다
const DATA_FILE = 'data-2026-06.json';

// ─── 도트 색상 ───
const DOT_COLORS = ['#4caf50','#ffc107','#2196f3','#9c27b0','#ff5722','#00bcd4','#e91e63','#795548'];

// ─── 커버 파싱 (날짜 추출) ───
function parseCoverItem(item) {
  const match = item.match(/^(.*?)\s*(\(\d+\.\s*\d+(?:\s*\/\s*\d+\.\s*\d+)?\))$/);
  if (match) return { text: match[1].trim(), date: match[2] };
  return { text: item, date: '' };
}

// ─── 1면: 표지 ───
function buildCover(d) {
  const m = d.meta;
  const items = d.coverItems.map((item, i) => {
    const p = parseCoverItem(item);
    return `<li><span class="date-tag">${p.date}</span> ${p.text}</li>`;
  }).join('');

  return `<div class="page cover">
    <div class="cover-top">
      <div class="cover-logo"><img src="photos/logo.png" style="width:100%;height:100%;object-fit:contain;"></div>
      <div class="cover-top-titles">
        <div class="mag-label">MAGAZINE</div>
        <div class="cn-title">平南 猛虎出林</div>
        <div class="kr-sub">평안남도 도정보고 소식지</div>
      </div>
      <div class="cover-issue-badge">
        <div class="year-month">${m.year}.${m.issueMonth}</div>
      </div>
    </div>

    <div class="cover-hero">
      <div class="cover-content">
        <div class="cover-headline-box">
          <div class="report-label">📋 ${m.year}년 ${m.reportMonth}월 도정보고</div>
          <div class="report-title">${m.year}년 ${m.reportMonth}월<br>평남 도정보고</div>
          <div class="report-sub">${m.issueLabel}</div>
        </div>

        <div class="cover-toc-label">주요내용</div>
        <ul class="cover-toc-list">${items}</ul>
      </div>
    </div>
  </div>`;
}

// ─── 본문 페이지 빌더 ───
function buildActivityBlock(act, small) {
  const imgPos = act.imagePosition === 'left' ? 'img-left' : 'img-right';
  const imgHtml = `<div class="activity-image">
    <img src="${act.image}" alt="${act.title}" loading="lazy">
    <div class="activity-image-caption">${act.title} (${act.date})</div>
  </div>`;
  const linksHtml = act.links && act.links.length
    ? `<div class="art-links">${act.links.map(l => `<a href="${l.url}" target="_blank" class="art-link-btn">🔗 ${l.title}</a>`).join('')}</div>`
    : '';
  const bodyHtml = `<div class="activity-body"><p>${act.body}</p>${linksHtml}</div>`;

  return `<div class="activity-block">
    <div class="activity-title-row">
      <h2>${act.title}<span class="date-inline">(${act.date})</span></h2>
      ${act.subtitle ? `<div class="activity-subtitle">${act.subtitle}</div>` : ''}
    </div>
    <div class="activity-with-img ${imgPos}">
      ${act.imagePosition === 'left' ? imgHtml + bodyHtml : bodyHtml + imgHtml}
    </div>
  </div>`;
}

function buildContentPage(activities, pageNum, meta, groupLabel) {
  const blocks = activities.map(a => buildActivityBlock(a)).join('');
  return `<div class="page content-page">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:10px;">
        <img src="photos/logo.png" style="width:36px;height:36px;object-fit:contain;">

    <div class="content-inner">${blocks}</div>

      <span class="copyright">Copyright. 평안남도 도지사실</span>
      <span class="page-num">${pageNum}</span>

}

// ─── 예정사항 페이지 ───

  const noticeLines = d.notice.lines.map((line, i) =>

// ─── 전체 소식지 조립 ───
async function buildMagazine() {
  let data;
  try {
    const res = await fetch(DATA_FILE + '?v=' + Date.now());
    data = await res.json();
  } catch(e) {
    // fetch 실패시 (파일 직접 열기) 내장 샘플 사용
    console.warn('JSON fetch 실패 - 내장 데이터 사용:', e.message);
    data = INLINE_DATA;
  }

  const mag = document.getElementById('magazine');
  const acts = data.activities.slice().sort((a, b) => {
    const toNum = d => { const [,day] = d.date.split('.'); return parseInt(day); };
    return toNum(a) - toNum(b);
  });
  const m = data.meta;

  // 1면: 표지
  mag.innerHTML += buildCover(data);

  // 본문: 2개씩 묶어서 페이지 생성
  const pageSize = 3;
  let pageNum = 1;
  for (let i = 0; i < acts.length; i += pageSize) {
    const slice = acts.slice(i, i + pageSize);
    const label = `${m.reportMonth}月`;
    mag.innerHTML += buildContentPage(slice, `${pageNum}-${Math.ceil(acts.length/pageSize)}`, m, label);
    pageNum++;
  }

  // 예정사항 페이지
  mag.innerHTML += buildUpcomingPage(data, `예정`);

  // 뒷표지
  mag.innerHTML += buildBackCover(data);

  // 16개시군 마무리 페이지
  mag.innerHTML += buildCitiesPage();
}

 평안남도민의 정체성과 공동체 정신이 깃든 상징임을 강조하며, 이번 공연 촬영이 실향민의 애환을 후대에 전하고 통일 기반을 다지는 소중한 문화적 기록이 될 것이라는 뜻을 밝혔다.", "image": "photos/2026-06/02_daedonggang.jpeg", "imagePosition": "left"}, {"id": 3, "title": "제55회 평남도민의 날 대회", "date": "5. 9", "subtitle": "도민회 주최 화합의 한마당", "body": "제55회 평남도민의 날 대회가 2026년 5월 9일 우신 중·고교 운동장에서 평안남도중앙도민회 주최로 개최됐다. 이날 행사는 평안남도 출신 도민들이 한자리에 모여 고향을 그리며 화합과 단결을 다지는 자리로 마련됐다. 정경조 평안남도지사는 귀빈으로 참석해 도민 모두가 하나 된 공동체 정신으로 평안남도의 전통과 자긍심을 이어가고 통일 기반 조성에 함께 나아가자는 뜻을 밝혔다.", "image": "photos/2026-06/05_citizens_day.jpeg", "imagePosition": "right", "links": [{"title": "관련 기사 보기", "url": "http://www.sctoday.co.kr/news/articleView.html?idxno=47878"}]}, {"id": 4, "title": "평남 통일원로회의 의원 회의", "date": "5. 9", "subtitle": "통일 원로들과 미래 논하다", "body": "정경조 평안남도지사는 2026년 5월 9일 오전 11시 평안남도청 소회의실에서 평남 통일원로회의 의원 회의를 주재했다. 이날 회의에는 평안남도를 이끌어오신 원로 의원들이 한자리에 모여 도정의 주요 현안과 사업 방향에 대해 심도 있게 논의했다. 오랜 세월 평안남도를 위해 헌신해 온 원로 의원들의 경험과 혜안은 도정 운영에 든든한 뒷받침이 되고 있다. 정경조 지사는 원로 의원들의 소중한 의견을 도정에 적극 반영하고, 평안남도가 더욱 발전해 나갈 수 있도록 최선을 다하겠다는 다짐을 밝혔다.", "image": "photos/2026-06/09_unification.jpeg", "imagePosition": "left"}, {"id": 5, "title": "위원회 간담회", "date": "5. 16", "subtitle": "도정 현안 머리 맞댄 간담회", "body": "이북5도위원회 간담회가 2026년 5월 16일 오전 10시 소회의실에서 개최됐다. 이번 간담회에서는 오는 6월로 예정된 국외이북도민 고국방문단 초청행사를 비롯한 주요 현안 사업들에 대한 논의가 이루어졌다. 정경조 평안남도지사는 참석하여 자리를 빛냈으며, 고향을 떠난 해외 도민들이 고국을 찾는 뜻깊은 자리가 성공적으로 마련될 수 있도록 적극 지원하겠다는 뜻을 전했다.", "image": "photos/2026-06/08_committee.png", "imagePosition": "right"}, {"id": 6, "title": "명예시장·군수 월례 회의", "date": "5. 16", "subtitle": "명예시장·군수와 도정 소통 강화", "body": "정경조 평안남도지사는 2026년 5월 16일 오후 3시, 도청 3층 평남시장·군수실에서 명예시장·군수 월례 회의를 주재했다. 이번 회의는 평안남도 각 지역을 대표하는 명예시장·군수들이 한자리에 모여 각 시군 현안을 공유하고 논의하는 자리로 마련됐다. 정경조 지사는 각 지역 명예시장·군수들의 의견을 도정 운영에 적극 반영하여 도민 화합과 공동체 정신을 더욱 공고히 해 나가겠다는 뜻을 밝혔다.", "image": "photos/2026-06/07_monthly_meeting.jpeg", "imagePosition": "left"}, {"id": 7, "title": "도 직원회의", "date": "5. 23", "subtitle": "도정 방향 점검 직원회의", "body": "정경조 평안남도지사는 5월 23일 오전 10시 도지사실에서 도 직원회의를 주재했다. 이번 회의는 도정 행정의 방향을 점검하고 직원 개개인의 역할과 책임을 공유하기 위해 마련됐다. 정경조 지사는 회의에서 개인별 담당업무 현황을 보고받고, 각 직원이 도정 행정을 능동적으로 이끌어 나갈 수 있도록 당부했다. 특히 직원 모두가 도정의 주체로서 책임감 있게 행정을 이끌고 도민에게 실질적인 도움이 되는 성과를 만들어 나가야 한다고 강조했다. 아울러 긴밀한 협력과 소통을 바탕으로 평안남도 도정 행정이 한 단계 더 발전할 수 있도록 최선을 다하겠다는 뜻을 밝혔다.", "image": "photos/logo.png", "imagePosition": "left"}, {"id": 8, "title": "한많은 대동강 뮤지컬 기자간담회", "date": "5. 23", "subtitle": "대동강 뮤지컬 공연 홍보 나서", "body": "정경조 평안남도지사는 2026년 5월 23일 이북5도청 평화강당에서 '한많은 대동강' 뮤지컬 기자간담회를 직접 주최하고 진행까지 맡아 행사를 이끌었다. 이날 간담회는 평안남도 실향민의 애환과 고향에 대한 그리움을 예술로 승화한 뮤지컬 공연을 언론에 소개하는 자리로 마련됐으며, 공연의 제작 배경과 주요 내용이 상세히 소개됐다. 정경조 지사는 이 뮤지컬이 단순한 공연을 넘어 도민의 정체성과 통일을 향한 염원을 담은 소중한 문화적 메시지임을 강조하며 많은 관심과 응원을 당부했다.", "image": "photos/2026-06/04_press.jpeg", "imagePosition": "right", "links": [{"title": "관련 기사 보기", "url": "https://www.kukak21.com/bbs/board.php?bo_table=news&wr_id=42907"}]}, {"id": 9, "title": "향두계놀이보존회 정기공연", "date": "5. 23", "subtitle": "전통 향두계놀이, 무대 위에 피어나다", "body": "정경조 평안남도지사는 2026년 5월 23일 국립국악원 풍류 사랑방에서 열린 향두계놀이보존회 정기공연에 참석했다. 향두계놀이는 평안도 지역의 오랜 세시풍속에서 비롯된 공동체 놀이문화로, 농경 사회의 두레 정신과 이웃 간 상부상조의 가치를 고스란히 담고 있는 소중한 무형문화유산이다. 이날 공연에서는 보존회 회원들이 전통 복식을 갖추고 선조들의 손길이 배인 가락과 몸짓을 힘차게 재현하며 관람객들로부터 큰 호응을 이끌어냈다. 정경조 지사는 이 자리에서 전통문화의 계승이 곧 도민 화합과 통일 한반도의 문화적 기반을 다지는 일임을 역설하며, 앞으로도 평안도 고유의 민속 예술을 보존하고 널리 알리는 데 도정의 역량을 아끼지 않겠다는 뜻을 밝혔다.", "image": "photos/2026-06/11_hyangdugye.png", "imagePosition": "left"}, {"id": 10, "title": "이북5도 개청77주년 기념", "date": "5. 23", "subtitle": "이북5도 개청 77주년 기념", "body": "정경조 평안남도지사는 2026년 5월 23일 오후 2시 이북5도청 5층 평화강당에서 열린 이북5도 개청 77주년 기념행사에 참석했다. 이번 행사는 1949년 이북5도위원회 설치 이후 77년간 이어온 실향민의 고향 수복 의지와 도정 활동의 역사를 기리기 위해 마련됐다. 이북5도는 분단의 아픔 속에서도 고유의 행정 체계와 전통을 굳건히 유지하며 통일을 향한 염원을 이어왔다. 정경조 지사는 이날 기념사를 통해 77년의 역사가 단순한 시간의 흐름이 아니라 도민의 결집된 통일 의지와 공동체 정신이 축적된 소중한 유산임을 강조하며, 앞으로도 이북5도의 정통성을 계승하고 통일 기반 조성에 더욱 힘쓸 것을 다짐했다.", "image": "photos/2026-06/03_anniversary77.jpeg", "imagePosition": "right"}, {"id": 11, "title": "평양내고향 여자 축구단 『북한여자축구 방한 경기관람』", "date": "5. 23", "subtitle": "남북 여자축구, 화합의 킥오프", "body": "정경조 평안남도지사는 2026년 5월 23일 오후 7시 수원 종합운동장에서 열린 평양내고향 여자 축구단의 북한 여자 축구 방한 경기를 관람했다. 이번 경기는 분단 이후 오랜 시간 단절되었던 남북 스포츠 교류의 물꼬를 다시 트는 역사적인 자리로, 평안남도 출신 실향민과 도민들에게 고향을 향한 그리움과 통일에 대한 희망을 되새기는 특별한 시간이 되었다. 그라운드 위에서 펼쳐진 선수들의 열정적인 플레이는 이념과 경계를 넘어 하나 된 민족의 가능성을 생생히 보여주었으며, 관중석을 가득 메운 도민들의 뜨거운 응원은 공동체 정신과 민족적 유대감을 한껏 고취시켰다. 정경조 지사는 이번 경기 관람이 평안남도 도민의 통일 염원을 실천으로 이어가는 소중한 계기가 되었으며, 앞으로도 남북 화합과 통일 기반 조성을 위한 다양한 교류 활동에 적극 동참해 나갈 것이라는 뜻을 밝혔다.", "image": "photos/2026-06/여자축구.png", "imagePosition": "left", "links": [{"title": "NYT 관련 기사 보기", "url": "https://www.nytimes.com/2026/05/20/world/asia/north-korea-soccer-south-naegohyang.html?unlocked_article_code=1.j1A.WsFn.WWml9Aj6_Vpa&smid=url-share"}]}, {"id": 12, "title": "민주평화통일자문회의 2분기 정기회의 및 역량강화", "date": "5. 23", "subtitle": "통일 역량 강화 한자리에", "body": "민주평화통일자문회의 2분기 정기회의 및 역량강화 행사가 2026년 5월 23일 오후 7시 30분 이북5도청 5층 평화강당에서 민주평통 주관으로 개최됐다. 이번 행사는 이북5도 전체를 대상으로 하는 회의로, 이북5도 각지의 자문위원들이 한자리에 모여 한반도 평화통일을 위한 과제와 실천 방안을 심도 있게 논의하는 자리로 마련됐다. 정경조 평안남도지사는 귀빈으로 참석하여 자리를 빛냈으며, 이북5도 도민 모두의 통일 의지를 결집하고 평화통일의 실질적 기반을 함께 다져나가자는 격려의 뜻을 전했다.", "image": "photos/2026-06/06_minpyeongtong.jpeg", "imagePosition": "right"}], "upcomingItems": [{"date": "6. 12~13", "title": "제11회 속초 실향민문화축제 (속초 엑스포 잔디광장)"}, {"date": "6. 20 (토)", "title": "양덕군민회 정기총회 (본고향맛집 / 12:00)"}], "notice": {"title": "필참 안내 | 제11회 속초 실향민문화축제", "icon": "📣", "lines": ["일시 : 2026. 6. 12(금) ~ 13(토)", "장소 : 속초 엑스포 잔디광장 일원", "운영시간 : 오전 10:00 ~ 오후 6:00", "합동망향제 · 함상위령제 · 개막공연 · 폐막공연", "전국 실향민 노래자랑 / 전국 이북·속초 사투리 경연대회", "북한이탈주민 예술단 공연 · 지역 문화예술 공연", "실향민문화 체험마을 · 이북 전통음식 체험 · 포토존", "문의 : 속초문화관광재단 sokchofestival.or.kr"]}, "schedule": [{"month": "1월", "items": "신년하례 / 국립현충원참배 / 읍·면·동장위촉식 / 행정자문위원회의 / 이북도민 실태조사 및 생활지원(연중)"}, {"month": "2월", "items": "통일원로회의 / 시장·군수월례회의(매월3주차 금요일)"}, {"month": "3월", "items": "읍면동장회의 / 시도사무소장회의 / 사회통합교육(반기1회) / 명예 도민증수여(분기1회)"}, {"month": "4월", "items": "정부포상추천 및 심사 방법 개선방안 토의 / 고향 찾아주기 프로그램 발전 / 행정자문위원회의"}, {"month": "5월", "items": "도민의 날 / 평안남도 명문가 찾기 / 3세가 찾아가는 뿌리 찾기 / 통일원로회의"}, {"month": "6월", "items": "국외이북도민 고국방문단 초청행사(6.22~26) / 명예 도민증 수여 / 시도사무소장 순회회의 / 6.25참전용사 감사·위안행사"}, {"month": "7월", "items": "제3회 북한이탈주민의 날 / 행정자문위원회의 / 한 많은 대동강 뮤지컬 공연 / 원자력발전소견학(예정)"}, {"month": "8월", "items": "화천 하나원방문 / 통일원로회의"}, {"month": "9월", "items": "제1회 평안남도 음식 문화 축제(예정) / 명예도민증수여 / 읍면·동장 분기 회의 / 시도사무소장 순회회의"}, {"month": "10월", "items": "제44회 이북도민 대통령기체육대회(10.17~18) / 정부 포상 수여 / 사회통합교육(후반기) / 행정자문위원회의"}, {"month": "11월", "items": "이북도민 청년의 날 정부포상 수여 / 통일원로회의 / 평안남도 무형유산 발굴 및 이수자 증 수여"}, {"month": "12월", "items": "2026년도 사업 분석 / 명예도민증수여 / 읍면동장분기회의 / 평안남도 명문가증수여 / 3세대가 찾아가는 뿌리 찾기 결과 포상"}]};
